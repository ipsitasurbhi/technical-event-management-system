<!DOCTYPE html>
<html>
<head>
  <title>Update Membership</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
  <h2>Update Membership</h2>

  <input placeholder="Membership ID"><br><br>

  <button onclick="extend()">Extend (6 months)</button>
  <button onclick="cancel()">Cancel Membership</button>
</div>

<script>
function extend(){
  alert("Membership Extended!");
}

function cancel(){
  alert("Membership Cancelled!");
}
</script>

</body>
</html>
