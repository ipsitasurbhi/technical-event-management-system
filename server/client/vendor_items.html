<!DOCTYPE html>
<html>
<head>
  <title>Your Items</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

  <h2>Your Items</h2>

  <div id="items"></div>

</div>

<script>
fetch("http://localhost:5000/api/products")
.then(res => res.json())
.then(data => {
  const div = document.getElementById("items");

  data.forEach(p => {
    div.innerHTML += `
      <p>${p.name} - ₹${p.price}</p>
    `;
  });
});
</script>

</body>
</html>
